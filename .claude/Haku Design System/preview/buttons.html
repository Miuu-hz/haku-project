<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--field-aurora);color:var(--fg-1)}
  .wrap{padding:24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  button{font-family:var(--font-sans);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font:var(--t-body-md);height:44px;padding:0 18px;border-radius:var(--r-3)}
  .pri{color:var(--fg-on-cyan);background:linear-gradient(180deg,#7BEBFF 0%,var(--crystal-400) 50%,var(--crystal-500) 100%);box-shadow:var(--glow-cyan)}
  .sec{color:var(--fg-1);background:var(--glass-fill);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);box-shadow:var(--shadow-glass-1)}
  .ghost{color:var(--fg-2);background:transparent;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .danger{color:#fff;background:linear-gradient(180deg,#ff8aa3 0%,#e8506e 100%);box-shadow:0 0 0 1px rgba(255,107,138,.4),0 0 24px rgba(255,107,138,.4)}
  .icon{width:44px;height:44px;padding:0;justify-content:center;border-radius:var(--r-pill)}
  .pill{height:36px;padding:0 14px;border-radius:var(--r-pill);font:var(--t-label)}
</style></head><body><div class="wrap">
  <button class="pri"><span class="msr msr--filled">auto_awesome</span>ถาม Haku</button>
  <button class="sec">บันทึก</button>
  <button class="ghost">ยกเลิก</button>
  <button class="icon sec"><span class="msr">add</span></button>
  <button class="icon pri"><span class="msr msr--filled">mic</span></button>
  <button class="pill sec">ทั้งหมด</button>
  <button class="pill" style="color:var(--fg-on-cyan);background:var(--crystal-300);box-shadow:var(--glow-cyan)">วันนี้</button>
  <button class="danger">ลบบันทึก</button>
</div></body></html>
