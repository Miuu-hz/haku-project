<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Foreground & Field</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--field-aurora);color:var(--fg-1)}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:12px}
  .ttl{font:var(--t-eyebrow);letter-spacing:var(--letter-eyebrow);text-transform:uppercase;color:var(--fg-3);margin:0}
  .row{display:flex;gap:10px;align-items:center}
  .chip{padding:6px 10px;border-radius:var(--r-2);font:var(--t-mono-sm);background:rgba(255,255,255,.06)}
  .field{height:50px;flex:1;border-radius:var(--r-3);box-shadow:0 0 0 1px rgba(255,255,255,.06)}
  .demo{padding:14px 16px;background:var(--glass-fill);border-radius:var(--r-3);box-shadow:var(--shadow-glass-1);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%)}
</style></head><body><div class="wrap">
  <p class="ttl">Foreground</p>
  <div class="demo">
    <p style="color:var(--fg-1);margin:0;font:var(--t-h4)">fg-1 · primary text · #F3F6FF</p>
    <p style="color:var(--fg-2);margin:6px 0 0;font:var(--t-body)">fg-2 · secondary · #B8C0DC — body and supporting copy on glass surfaces</p>
    <p style="color:var(--fg-3);margin:6px 0 0;font:var(--t-caption)">fg-3 · tertiary · #7D88AD — captions, eyebrows, metadata</p>
    <p style="color:var(--fg-4);margin:6px 0 0;font:var(--t-caption)">fg-4 · disabled · #4A5378</p>
  </div>
  <p class="ttl" style="margin-top:6px">Field</p>
  <div class="row">
    <div class="field" style="background:var(--field-0)"></div>
    <div class="field" style="background:var(--field-1)"></div>
    <div class="field" style="background:var(--field-2)"></div>
    <div class="field" style="background:var(--field-3)"></div>
  </div>
</div></body></html>
