<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Colors — Vivid Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--field-aurora);color:var(--fg-1)}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .sw{aspect-ratio:1.5;border-radius:var(--r-3);position:relative;overflow:hidden;display:flex;align-items:end;padding:10px;font:var(--t-mono-sm);color:#04141a}
  .ttl{font:var(--t-eyebrow);letter-spacing:var(--letter-eyebrow);text-transform:uppercase;color:var(--fg-3);margin:0}
  .note{font:var(--t-caption);color:var(--fg-3);margin:0}
</style></head><body><div class="wrap">
  <p class="ttl">Vivid accents — Now-Brief categories</p>
  <div class="grid">
    <div class="sw" style="background:var(--vivid-lime)">Lime · calendar</div>
    <div class="sw" style="background:var(--vivid-mint)">Mint · health</div>
    <div class="sw" style="background:var(--vivid-gold)">Gold · weather</div>
    <div class="sw" style="background:var(--vivid-coral)">Coral · location</div>
    <div class="sw" style="background:var(--vivid-magenta)">Magenta · mood</div>
  </div>
  <p class="note">One vivid accent per card category — never two on the same card. Always emerges from inside the glass via gradient or glow, never a solid block on top.</p>
</div></body></html>
