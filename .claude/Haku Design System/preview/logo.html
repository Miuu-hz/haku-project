<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brand · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--field-aurora);color:var(--fg-1)}
  .wrap{padding:22px 28px;display:flex;align-items:center;gap:22px}
  .logo{width:88px;height:88px;border-radius:24px;background:#fff;display:grid;place-items:center;box-shadow:var(--shadow-glass-2),0 0 32px rgba(60,223,255,.45)}
  .logo img{width:80px;height:80px;object-fit:contain}
  .lock{display:flex;flex-direction:column;gap:2px}
  .name{display:flex;align-items:baseline;gap:10px}
  .name .latin{font:var(--t-h1);letter-spacing:var(--letter-display);background:linear-gradient(180deg,#fff,var(--crystal-300));-webkit-background-clip:text;background-clip:text;color:transparent}
  .name .jp{font:600 32px/1 var(--font-sans);color:var(--fg-3)}
  .tag{font:var(--t-caption);color:var(--fg-3);letter-spacing:.06em}
</style></head><body><div class="wrap">
  <div class="logo"><img src="../assets/haku-icon.png" alt=""></div>
  <div class="lock">
    <div class="name"><span class="latin">Haku</span><span class="jp">箱</span></div>
    <span class="tag">AI Personal Life Logger · privacy-first, on-device</span>
  </div>
</div></body></html>
