<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Bottom Nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--field-aurora);color:var(--fg-1)}
  .wrap{padding:30px 24px;display:flex;justify-content:center;align-items:center;min-height:100%}
  .nav{display:flex;align-items:center;gap:6px;padding:8px;border-radius:var(--r-pill);background:var(--glass-fill-strong);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);box-shadow:var(--shadow-glass-2)}
  .item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 18px;border-radius:var(--r-pill);font:var(--t-label);color:var(--fg-3);cursor:pointer}
  .item .msr{font-size:22px}
  .item.active{color:var(--fg-on-cyan);background:linear-gradient(180deg,#7BEBFF,var(--crystal-400));box-shadow:var(--glow-cyan)}
  .item.active .msr{font-variation-settings:"FILL" 1,"wght" 500}
  .item:not(.active):hover{color:var(--fg-1)}
</style></head><body><div class="wrap">
  <nav class="nav">
    <div class="item active"><span class="msr">grid_view</span><span>Lookup</span></div>
    <div class="item"><span class="msr">forum</span><span>Chat</span></div>
    <div class="item"><span class="msr">tune</span><span>Settings</span></div>
  </nav>
</div></body></html>
