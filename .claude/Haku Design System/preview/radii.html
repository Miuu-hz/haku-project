<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--field-aurora);color:var(--fg-1)}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{width:64px;height:64px;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.04));box-shadow:0 0 0 1px rgba(255,255,255,.1)}
  .nm{font:var(--t-eyebrow);letter-spacing:var(--letter-eyebrow);text-transform:uppercase;color:var(--fg-3)}
  .px{font:var(--t-mono-sm);color:var(--fg-2)}
</style></head><body><div class="wrap">
  <div class="cell"><div class="box" style="border-radius:var(--r-1)"></div><span class="nm">r-1</span><span class="px">6</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--r-2)"></div><span class="nm">r-2</span><span class="px">10</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--r-3)"></div><span class="nm">r-3</span><span class="px">16</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--r-4)"></div><span class="nm">r-4</span><span class="px">22</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--r-5)"></div><span class="nm">r-5</span><span class="px">28</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--r-6)"></div><span class="nm">r-6</span><span class="px">36</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--r-pill)"></div><span class="nm">pill</span><span class="px">999</span></div>
</div></body></html>
