<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Shadows & Glow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--field-aurora);color:var(--fg-1)}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .card{height:120px;border-radius:var(--r-4);background:var(--glass-fill);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;font:var(--t-eyebrow);letter-spacing:var(--letter-eyebrow);text-transform:uppercase;color:var(--fg-2)}
  .card .desc{font:var(--t-mono-sm);text-transform:none;letter-spacing:0;color:var(--fg-3);margin-top:2px}
</style></head><body><div class="wrap">
  <div class="card" style="box-shadow:var(--shadow-glass-1)">glass-1<span class="desc">default cards</span></div>
  <div class="card" style="box-shadow:var(--shadow-glass-2)">glass-2<span class="desc">elevated / hero</span></div>
  <div class="card" style="box-shadow:var(--glow-cyan)">glow-cyan<span class="desc">primary AI affordance</span></div>
  <div class="card" style="box-shadow:var(--glow-lavender)">glow-lavender<span class="desc">sentiment / mood</span></div>
</div></body></html>
