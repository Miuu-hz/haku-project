<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--field-aurora);color:var(--fg-1)}
  .wrap{padding:22px 24px;display:flex;flex-direction:column;gap:10px}
  .ttl{font:var(--t-eyebrow);letter-spacing:var(--letter-eyebrow);text-transform:uppercase;color:var(--fg-3);margin:0 0 4px}
  .row{display:flex;align-items:center;gap:12px;font:var(--t-mono-sm);color:var(--fg-2)}
  .bar{height:14px;border-radius:4px;background:linear-gradient(90deg,var(--crystal-400),var(--crystal-600));box-shadow:0 0 12px rgba(60,223,255,.4)}
  .name{width:46px;color:var(--fg-3)}
  .px{width:46px;color:var(--fg-3);text-align:right}
</style></head><body><div class="wrap">
  <p class="ttl">Spacing scale (8px base)</p>
  <div class="row"><span class="name">s-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="name">s-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="name">s-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="name">s-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="name">s-5</span><div class="bar" style="width:20px"></div><span class="px">20px</span></div>
  <div class="row"><span class="name">s-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="name">s-7</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="name">s-8</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="name">s-9</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
</div></body></html>
