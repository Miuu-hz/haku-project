<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:transparent;color:var(--fg-1);font-family:var(--font-sans)}
  .wrap{padding:22px 26px;background:var(--field-aurora);min-height:100%}
  .num{font:var(--t-numeral);letter-spacing:var(--letter-display);background:linear-gradient(180deg,#fff 0%,var(--crystal-300) 60%,var(--crystal-500) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:.95}
  .row{display:flex;align-items:baseline;gap:18px;margin-top:10px}
  .meta{color:var(--fg-3);font:var(--t-mono-sm)}
  .h1{font:var(--t-h1);letter-spacing:var(--letter-display);margin:0}
  .lab{color:var(--fg-3);font:var(--t-eyebrow);letter-spacing:var(--letter-eyebrow);text-transform:uppercase;margin:0 0 6px}
</style></head><body><div class="wrap">
  <p class="lab">Display numeral</p>
  <div class="row"><div class="num">07:42</div><div class="meta">Inter 700 · 64/1 · -2% tracking · gradient fill</div></div>
  <p class="lab" style="margin-top:18px">Display heading</p>
  <h1 class="h1">สวัสดีตอนเช้า, มิว</h1>
  <p class="meta" style="margin-top:6px">Noto Sans Thai 700 · 36/1.1 · -2% tracking</p>
</div></body></html>
