<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--field-aurora);color:var(--fg-1)}
  .wrap{padding:18px 24px;display:flex;flex-direction:column;gap:10px}
  .row{display:grid;grid-template-columns:90px 1fr 200px;align-items:baseline;gap:18px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:8px}
  .row:last-child{border-bottom:none}
  .name{font:var(--t-eyebrow);letter-spacing:var(--letter-eyebrow);text-transform:uppercase;color:var(--fg-3)}
  .meta{font:var(--t-mono-sm);color:var(--fg-3);text-align:right}
  .h2{font:var(--t-h2);letter-spacing:var(--letter-display);margin:0}
  .h3{font:var(--t-h3);margin:0}
  .h4{font:var(--t-h4);margin:0}
  .body{font:var(--t-body);margin:0;color:var(--fg-2)}
  .lbl{font:var(--t-label);margin:0;color:var(--fg-2)}
  .cap{font:var(--t-caption);margin:0;color:var(--fg-3)}
</style></head><body><div class="wrap">
  <div class="row"><span class="name">H2</span><h2 class="h2">บันทึกของวันนี้</h2><span class="meta">28/1.2 · 600</span></div>
  <div class="row"><span class="name">H3</span><h3 class="h3">นัดหมายที่กำลังจะมาถึง</h3><span class="meta">22/1.25 · 600</span></div>
  <div class="row"><span class="name">H4</span><h4 class="h4">Crystal core</h4><span class="meta">18/1.3 · 600</span></div>
  <div class="row"><span class="name">Body</span><p class="body">ข้อมูลของคุณเก็บบนเครื่องนี้เท่านั้น Haku ประมวลผลทั้งหมดแบบ on-device</p><span class="meta">15/1.5 · 400</span></div>
  <div class="row"><span class="name">Label</span><p class="lbl">บันทึกใหม่</p><span class="meta">13/1.3 · 500</span></div>
  <div class="row"><span class="name">Caption</span><p class="cap">เมื่อ 5 นาทีที่แล้ว</p><span class="meta">12/1.35 · 500</span></div>
</div></body></html>
