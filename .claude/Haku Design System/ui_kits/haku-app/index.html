<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Haku — UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    html,body{margin:0;padding:0;background:linear-gradient(135deg,#dceeff,#f0e6ff);min-height:100%;color:var(--fg-1);font-family:var(--font-sans)}
    .stage{min-height:100vh;display:grid;place-items:center;padding:32px 16px}
  </style>
</head>
<body>
  <div class="stage">
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="Lookup.jsx"></script>
  <script type="text/babel" src="Chat.jsx"></script>
  <script type="text/babel" src="Settings.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function HakuApp() {
      const [tab, setTab] = useState("lookup");

      return (
        <IOSDevice dark={true} width={402} height={874}>
          <div className="haku-app" style={{ height: "100%" }}>
            <span className="orb cyan"></span>
            <span className="orb lavender"></span>
            <span className="orb magenta"></span>
            <span className="orb lime"></span>

            <div className={"scr" + (tab === "lookup" ? " active" : "")}>
              <div className="scr-head" data-screen-label="Lookup">
                <span className="eye">Lookup · ภาพรวมวันนี้</span>
              </div>
              {tab === "lookup" ? <LookupScreen /> : null}
            </div>

            <div className={"scr" + (tab === "chat" ? " active" : "")} data-screen-label="Chat">
              {tab === "chat" ? <ChatScreen /> : null}
            </div>

            <div className={"scr" + (tab === "set" ? " active" : "")} data-screen-label="Settings">
              {tab === "set" ? <SettingsScreen /> : null}
            </div>

            <BottomNav active={tab} onChange={setTab} />
          </div>
        </IOSDevice>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<HakuApp />);
  </script>
</body>
</html>
