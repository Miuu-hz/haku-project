plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.example.haku"
    compileSdk 36
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.haku"
        minSdkVersion 28
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        
        externalNativeBuild {
            cmake {
                cppFlags "-O3 -flto -ffunction-sections -fdata-sections -fexceptions -frtti"
                // ⚠️ CPU-ONLY MODE - ปิด Vulkan เพื่อป้องกัน crash บน Adreno GPU (Qualcomm)
                // Adreno GPU มีปัญหา Vulkan shader crash กับ llama.cpp
                // ถ้าต้องการเปิด Vulkan: เปลี่ยน HAKU_CPU_ONLY=OFF และ GGML_VULKAN=ON
                arguments "-DANDROID_STL=c++_shared",
                          "-DHAKU_CPU_ONLY=ON",
                          "-DGGML_VULKAN=OFF"
                // Build เฉพาะ ARM64
                abiFilters 'arm64-v8a'
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            externalNativeBuild {
                cmake {
                    cppFlags "-O3 -flto -DNDEBUG"
                }
            }
        }
        debug {
            signingConfig signingConfigs.debug
            externalNativeBuild {
                cmake {
                    cppFlags "-O0 -g"
                }
            }
            // Debug ใช้แค่ ARM64 เหมือนกัน (ลดเวลา build และป้องกันปัญหา APK location)
            ndk {
                abiFilters 'arm64-v8a'
            }
        }
    }
    
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }
    
    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libhaku_llm.so'
        // MediaPipe GenAI native libs
        jniLibs {
            useLegacyPackaging = true
        }
    }
    
    // ปิด splits เพื่อให้ Flutter หา APK เจอ (Flutter จะจัดการเอง)
    // splits {
    //     abi {
    //         enable true
    //         universalApk true
    //     }
    // }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.1.0"
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    
    // 🤖 MediaPipe GenAI - LLM Inference (ต้องใช้ version ล่าสุด)
    implementation 'com.google.mediapipe:tasks-genai:0.10.24'
    
    // 📱 Flutter Local Notifications - Core Library Desugaring
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
