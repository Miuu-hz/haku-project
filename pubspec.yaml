name: haku
description: "Haku (箱) - AI Personal Life Logger แบบ Privacy-First ทำงานบนอุปกรณ์"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # 🗄️ ฐานข้อมูล
  sqflite: ^2.3.0                    # SQLite สำหรับ Flutter
  sqflite_common_ffi: ^2.3.0         # FFI support สำหรับ SQLCipher ในอนาคต
  path: ^1.8.3                       # จัดการ path
  path_provider: ^2.1.1              # หา directory สำหรับเก็บข้อมูล
  
  # 📍 ตำแหน่งที่ตั้ง (ประหยัดแบต)
  geolocator: ^10.1.0                # ขอพิกัด GPS
  geocoding: ^2.1.1                  # แปลงพิกัดเป็นชื่อสถานที่
  
  # 🎨 UI & State Management
  flutter_riverpod: ^2.4.9           # State Management ( lightweight )
  intl: ^0.18.1                      # จัดการวันที่/เวลา
  google_fonts: ^6.1.0               # ฟอนต์สวยๆ
  flutter_slidable: ^3.0.1           # ปัดซ้าย/ขวาใน List
  
  # 📤 Export/Import
  share_plus: ^7.2.1                 # แชร์ไฟล์ออกไป
  file_picker: ^8.0.0                # เลือกไฟล์สำหรับ Import
  
  # 🔒 Security & Biometric
  flutter_secure_storage: ^9.0.0     # เก็บ encryption key
  encrypt: ^5.0.1                    # Encryption utilities
  local_auth: ^2.2.0                 # Face ID / Fingerprint
  local_auth_android: ^1.0.34
  local_auth_ios: ^1.1.6
  
  # 🗄️ SQLCipher (Encrypted SQLite)
  sqflite_sqlcipher: ^3.1.0+1        # SQLite + Encryption
  
  # 🎙️ อัดเสียง (เตรียมไว้ Phase 2)
  # record: ^5.0.4                   # อัดเสียง
  # speech_to_text: ^6.5.1           # แปลงเสียงเป็นข้อความ
  
  # 🖼️ รูปภาพ
  image_picker: ^1.0.7               # เลือกรูปจากกล้อง/แกลเลอรี
  # image: ^4.1.3                    # ประมวลผลรูปภาพ (เตรียมไว้)
  
  # 💾 Preferences
  shared_preferences: ^2.2.2        # บันทึกการตั้งค่า

  # 📱 Widgets (Android)
  home_widget: ^0.7.0                # สื่อสารกับ Home Screen Widgets (อัพเกรดรองรับ Java 17)
  
  # 🤖 TFLite - ใช้ Gemma-2 (Google, ไม่ crash)
  tflite_flutter: ^0.10.4
  
  # 🔔 Local Notifications
  flutter_local_notifications: ^17.2.3

  # 🌐 HTTP Client สำหรับดาวน์โหลดโมเดล
  http: ^1.2.0

  # 🔋 Battery Monitoring (สำหรับ Defer to Charging)
  battery_plus: ^6.0.0

  # ⏰ Timezone support สำหรับ zonedSchedule notifications
  timezone: ^0.9.4

  # 🌐 URL Launcher (สำหรับเปิด Maps, Browser)
  url_launcher: ^6.2.5

  # 🗺️ Map Widgets (Flutter Map + LatLong)
  flutter_map: ^7.0.0
  latlong2: ^0.9.1

  # 🌐 HTML Parser (สำหรับ Web Scraping)
  html: ^0.15.4

  # 🔐 Runtime Permissions (Calendar, ฯลฯ)
  permission_handler: ^11.3.1

  # 🔑 Google Sign-In (สำหรับ Calendar Sync)
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    # โมเดล LLM อยู่ใน folder models/ ที่ root (ไม่ใช่ assets/)
    # แอพจะอ่านจาก models/ แล้ว copy ไปยัง app storage
